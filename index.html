<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <title>Super Bowl</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/audio-controls.css">
  </head>
  <body data-bg-track="assets/main_theme.mp3">

    <!-- Scanlines retro overlay -->
    <div class="scanlines"></div>

    <!-- Content -->
    <div class="content">

      <!-- Pixel-bordered container -->
      <div class="pixel-box-outer">
        <div class="pixel-box">

          <div class="corner corner-tl"></div>
          <div class="corner corner-tr"></div>
          <div class="corner corner-bl"></div>
          <div class="corner corner-br"></div>

          <a href="eleccion.html" class="pixel-btn-link">
            <div class="pixel-btn">
              <div class="pixel-btn-shadow"></div>
              <div class="pixel-btn-face">
                <span>Press Start</span>
              </div>
            </div>
          </a>

        </div>
      </div>

    </div>

    <script src="js/audio-manager.js"></script>
